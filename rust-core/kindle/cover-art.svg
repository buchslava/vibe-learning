<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" width="432" height="648" viewBox="0 0 432 648">
  <defs>
    <clipPath id="logoPlate">
      <circle cx="324" cy="342" r="108"/>
    </clipPath>
  </defs>

  <!-- full bleed dark ground -->
  <rect width="432" height="648" fill="#1A1A2E"/>

  <!-- top accent rule -->
  <rect width="432" height="10" fill="#CE422B"/>

  <!-- Rust logo on neutral plate (Icons8) — clipped to a true circle -->
  <g clip-path="url(#logoPlate)">
    <circle cx="324" cy="342" r="108" fill="#F2F2F4"/>
    <image x="228" y="246" width="192" height="192" href="rust-logo-icons8.png" preserveAspectRatio="xMidYMid meet"/>
  </g>
  <circle cx="324" cy="342" r="108" fill="none" stroke="#D8D8DC" stroke-width="1.2"/>

  <!-- typography -->
  <text x="36" y="72" font-family="Helvetica, Arial, sans-serif" font-size="11" letter-spacing="2.5" fill="#D1D5DB" opacity="0.72">VIBE LEARNING</text>

  <g transform="translate(318, 52) rotate(-8)">
    <rect x="0" y="0" width="96" height="28" rx="4" fill="none" stroke="#CE422B" stroke-width="1.5"/>
    <text x="48" y="19" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="11" font-weight="700" letter-spacing="2" fill="#CE422B">DRAFT</text>
  </g>

  <!-- title: one line, dual color -->
  <text x="36" y="132" font-family="Helvetica, Arial, sans-serif" font-size="48" font-weight="700" fill="#FFFFFF">Rust</text>
  <text x="152" y="132" font-family="Helvetica, Arial, sans-serif" font-size="48" font-weight="700" fill="#CE422B">Core</text>

  <!-- subtitle -->
  <text x="36" y="182" font-family="Palatino, Georgia, serif" font-size="14" fill="#D1D5DB">Language fundamentals for programmers</text>
  <text x="36" y="202" font-family="Palatino, Georgia, serif" font-size="14" fill="#D1D5DB">coming from another language</text>

  <!-- author — bottom safe zone (~1in from trim) -->
  <rect x="36" y="528" width="52" height="3" fill="#CE422B"/>
  <text x="36" y="554" font-family="Helvetica, Arial, sans-serif" font-size="10" letter-spacing="1.2" fill="#D1D5DB" opacity="0.88">VIACHESLAV CHUB</text>
  <text x="36" y="572" font-family="Helvetica, Arial, sans-serif" font-size="9" fill="#D1D5DB" opacity="0.62">2026</text>
</svg>
